<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>كفة | لوحة الكاشير</title>
<link rel="icon" href="assets/icon-teal.png" />
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="kiffa-pattern-bg">
  <div class="dash-header">
    <img class="logo" src="assets/lockup-white.png" alt="كفة" />
    <h1>لوحة الكاشير</h1>
  </div>
</div>

<div class="dash-wrap">
  <div class="dash-panel">
    <div class="panel-title">
      <h2>الطلبات المعلّقة</h2>
      <span class="pending-count" id="pending-count">0</span>
    </div>
    <div id="orders-grid" class="orders-grid"></div>
    <div id="empty-state" class="empty-state hidden">
      <div class="emoji">☕</div>
      لا توجد طلبات معلّقة حالياً
    </div>
  </div>
</div>

<div class="confirm-overlay hidden" id="confirm-overlay">
  <div class="confirm-box">
    <div>تأكيد جاهزية الفاتورة</div>
    <div class="order-num" id="confirm-invoice-num">—</div>
    <div class="actions">
      <button class="btn btn-ghost" id="cancel-confirm">إلغاء</button>
      <button class="btn btn-primary" id="do-confirm">تأكيد الجاهزية</button>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script src="dashboard.js"></script>
</body>
</html>
